<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Gismeteo Precipitation exports Gismeteo 10-day precipitation forecasts to Excel.">
  <title>Gismeteo Precipitation</title>
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
  <style>
    :root {
      color-scheme: dark;
      --bg: #020617;
      --panel: #0f172a;
      --panel-2: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --line: #263244;
      --green: #16a34a;
      --green-hover: #22c55e;
      --blue: #2563eb;
      --blue-hover: #3b82f6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(37, 99, 235, .22), transparent 32rem),
        radial-gradient(circle at 80% 10%, rgba(22, 163, 74, .22), transparent 28rem),
        var(--bg);
      color: var(--text);
    }

    main {
      width: min(920px, calc(100% - 32px));
      margin: 0 auto;
      padding: 72px 0;
    }

    .hero {
      display: grid;
      grid-template-columns: 112px 1fr;
      gap: 28px;
      align-items: center;
      padding: 32px;
      background: color-mix(in srgb, var(--panel) 88%, transparent);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, .34);
    }

    .icon {
      width: 112px;
      height: 112px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 5vw, 54px);
      line-height: 1;
      letter-spacing: 0;
    }

    .actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 22px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 999px;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid rgba(255, 255, 255, .1);
      transition: transform .16s ease, background-color .16s ease, box-shadow .16s ease;
    }

    .button:hover {
      transform: translateY(-1px);
    }

    .button-tampermonkey {
      background: var(--blue);
      box-shadow: 0 12px 26px rgba(37, 99, 235, .26);
    }

    .button-tampermonkey:hover {
      background: var(--blue-hover);
    }

    .button-script {
      background: var(--green);
      box-shadow: 0 12px 26px rgba(22, 163, 74, .26);
    }

    .button-script:hover {
      background: var(--green-hover);
    }

    footer {
      margin-top: 22px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    @media (max-width: 700px) {
      main {
        padding: 28px 0;
      }

      .hero {
        grid-template-columns: 1fr;
        padding: 24px;
      }

    }
  </style>
</head>
<body>
  <main>
    <section class="hero" aria-labelledby="title">
      <img class="icon" src="assets/icon.svg" alt="">
      <div>
        <h1 id="title">Gismeteo Precipitation</h1>
        <div class="actions">
          <a class="button button-tampermonkey" href="https://chromewebstore.google.com/detail/tampermonkey/dhdgffkkebhmkfjojejmpbldmpobfkfo" target="_blank" rel="noopener">Установить Tampermonkey</a>
          <a class="button button-script" href="https://raw.githubusercontent.com/gromov341112-gif/Gismeteo/main/gismeteo-excel.user.js">Установить Gismeteo Precipitation</a>
        </div>
      </div>
    </section>

    <footer>Version 8.0 · Author HARIBB</footer>
  </main>
</body>
</html>
